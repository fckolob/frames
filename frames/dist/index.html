  <style rel="stylesheet" crossorigin>
    :root {
      font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      font-weight: 400;
      color-scheme: light dark;
      color: #ffffffde;
      background-color: #242424;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale
    }

    a {
      font-weight: 500;
      color: #646cff;
      text-decoration: inherit
    }

    a:hover {
      color: #535bf2
    }

    body {
      margin: 0;
      display: flex;
      place-items: center;
      min-width: 320px;
      min-height: 100vh
    }

    h1 {
      font-size: 3.2em;
      line-height: 1.1
    }

    #app {
      width: 90%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center
    }

    .logo {
      height: 6em;
      padding: 1.5em;
      will-change: filter;
      transition: filter .3s
    }

    .logo:hover {
      filter: drop-shadow(0 0 2em #646cffaa)
    }

    .logo.vanilla:hover {
      filter: drop-shadow(0 0 2em #f7df1eaa)
    }

    .card {
      padding: 2em
    }

    .read-the-docs {
      color: #888
    }

    button {
      border-radius: 8px;
      border: 1px solid transparent;
      padding: .6em 1.2em;
      font-size: 1em;
      font-weight: 500;
      font-family: inherit;
      background-color: #1a1a1a;
      cursor: pointer;
      transition: border-color .25s
    }

    button:hover {
      border-color: #646cff
    }

    button:focus,
    button:focus-visible {
      outline: 4px auto -webkit-focus-ring-color
    }

    #container {
      width: 90%;
      margin: 0 auto
    }

    .form-element {
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: .5rem;
      margin: 0 auto;
      background-color: gold;
      border-radius: 1rem
    }

    .form-input {
      width: 90%;
      text-align: left;
      padding: .5rem;
      margin: .5rem;
      font-size: 1rem;
      border-radius: 1rem
    }

    input:required:invalid,
    input:focus:invalid {
      border: 2px dashed red;
      background-color: #ff440073
    }

    input:required:valid {
      border: 2px solid green;
      background-color: #7cfc00;
      color: #00008b
    }

    .form-label {
      width: 90%;
      text-align: left;
      padding: .5rem;
      margin: .5rem;
      font-size: 1rem;
      color: #000;
      font-weight: 700
    }

    .form-submit {
      width: 40%;
      text-align: center;
      padding: .5rem;
      margin: .5rem;
      border-radius: 1rem;
      background-color: #646cff;
      color: #00008b;
      font-size: 1.5rem;
      border: 1px solid transparent;
      transition: border-color .25s;
      transition: ease-in-out 1s
    }

    .form-submit:hover {
      border-color: coral;
      transform: scale(1.2);
      background-color: #00f;
      color: #dc143c;
      border-radius: 50%
    }

    .materials-li,
    .production-li {
      font-size: 1.5rem;
      padding: 1rem
    }

    .production-list {
      white-space: pre-wrap
    }

    @media(prefers-color-scheme:light) {
      :root {
        color: #213547;
        background-color: #fff
      }

      a:hover {
        color: #747bff
      }

      button {
        background-color: #f9f9f9
      }
    }

    @media print {

      .materials-li,
      .production-li {
        font-size: 2rem;
        padding: 1rem
      }

      button,
      .toggle-plan-btn {
        display: none !important
      }

      .production-title {
        font-size: 2.4rem;
        padding: 1rem
      }

      .cutting-plan-wrapper,
      .cutting-plan-container {
        display: block !important;
        page-break-inside: avoid
      }
    }
  </style>
</head>
